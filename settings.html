<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>הגדרות | מנהל ההזמנות</title>
    <meta name="theme-color" content="#059669">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>(function(){var t=localStorage.getItem('veg-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');if(t==='dark')document.documentElement.classList.add('dark');})();</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }</style>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900">

    <!-- Header -->
    <header class="bg-emerald-600 text-white px-4 py-4 flex items-center gap-3 shadow-lg sticky top-0 z-10">
        <a href="index.html" class="p-2 rounded-xl hover:bg-emerald-700 transition-colors">
            <i class="fas fa-arrow-right text-lg"></i>
        </a>
        <h1 class="text-xl font-bold">הגדרות</h1>
    </header>

    <main class="max-w-lg mx-auto p-4 space-y-4">

        <!-- Dark Mode Toggle -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-5">
            <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100 mb-1 flex items-center gap-2">
                <i class="fas fa-moon text-indigo-500"></i>
                מצב תצוגה
            </h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">בחר מצב בהיר או כהה. ברירת המחדל עוקבת אחר הגדרת המכשיר.</p>
            <button onclick="toggleTheme()"
                class="w-full flex items-center justify-between bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl px-5 py-4 transition-colors active:scale-95">
                <span class="font-semibold text-gray-700 dark:text-gray-200 flex items-center gap-3">
                    <i class="theme-icon fas fa-moon text-lg text-indigo-500"></i>
                    <span class="theme-label">מצב כהה</span>
                </span>
                <span class="text-xs text-gray-400 dark:text-gray-500">לחץ להחלפה</span>
            </button>
        </div>

        <!-- WhatsApp Groups -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-5">
            <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100 mb-1 flex items-center gap-2">
                <i class="fab fa-whatsapp text-green-500"></i>
                קבוצות WhatsApp
            </h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
                ניהול קישורי ההצטרפות לקבוצות WhatsApp שאליהן נשלחות ההזמנות.
            </p>
            <a href="groups.html"
                class="w-full flex items-center justify-between bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl px-5 py-4 transition-colors active:scale-95">
                <span class="font-semibold text-gray-700 dark:text-gray-200 flex items-center gap-3">
                    <i class="fas fa-users text-lg text-emerald-500"></i>
                    ניהול קבוצות
                </span>
                <i class="fas fa-chevron-left text-gray-400"></i>
            </a>
        </div>

    </main>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav-container md:hidden fixed bottom-0 left-0 right-0 z-50 bg-emerald-700 text-white shadow-2xl">
        <div class="flex">
            <a href="index.html" class="mobile-nav-item flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-xs font-medium text-white/80 hover:text-white">
                <i class="fas fa-home text-xl"></i><span>בית</span>
            </a>
            <a href="catalog.html" class="mobile-nav-item flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-xs font-medium text-white/80 hover:text-white">
                <i class="fas fa-tag text-xl"></i><span>מחירונים</span>
            </a>
            <a href="suppliers.html" class="mobile-nav-item flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-xs font-medium text-white/80 hover:text-white">
                <i class="fas fa-truck text-xl"></i><span>ספקים</span>
            </a>
            <a href="monthly-report.html" class="mobile-nav-item flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-xs font-medium text-white/80 hover:text-white">
                <i class="fas fa-chart-line text-xl"></i><span>דוחות</span>
            </a>
            <a href="settings.html" class="mobile-nav-item flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-xs font-medium text-amber-300">
                <i class="fas fa-cog text-xl"></i><span>הגדרות</span>
            </a>
        </div>
    </nav>
    <script src="js/sync.js"></script>
</body>
</html>
